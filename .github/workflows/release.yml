name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      signed:
        description: "Use signing keystore (requires secrets)"
        type: boolean
        default: false

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager --install "platforms;android-36" "build-tools;36.0.0"

      - name: Decode signing keystore
        env:
          KEYSTORE_B64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYSTORE_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEYSTORE_KEYPASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_B64" ]; then
            echo "$KEYSTORE_B64" | base64 -d > app/ci-release.keystore
            echo "KEYSTORE_PATH=$PWD/app/ci-release.keystore" >> "$GITHUB_ENV"
            echo "KEYSTORE_PASSWORD=$KEYSTORE_PASS" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=$KEYSTORE_ALIAS" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=$KEYSTORE_KEYPASS" >> "$GITHUB_ENV"
            echo "Signing enabled"
          else
            echo "No keystore secrets configured. Building unsigned APK."
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Determine APK path
        id: apk
        run: |
          APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" -not -name "*unsigned*" | head -1)
          echo "path=$APK_PATH" >> "$GITHUB_OUTPUT"
          echo "APK: $APK_PATH"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.apk.outputs.path }}
          generate_release_notes: true
