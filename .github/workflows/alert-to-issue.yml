name: Alert → Issue

on:
  workflow_run:
    workflows: ["CodeQL"]
    types: [completed]
  workflow_dispatch:
    inputs:
      ref:
        description: "Branch to scan (e.g. refs/heads/main)"
        required: false
        default: "refs/heads/main"

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  create-issues:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Create issues for open alerts
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          OWNER: ${{ github.repository_owner }}
          EVENT_NAME: ${{ github.event_name }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          INPUT_REF: ${{ inputs.ref }}
        run: |
          # Determine which ref to query (full ref for the API, short name for display)
          if [[ "${EVENT_NAME}" == "workflow_run" ]]; then
            REF="refs/heads/${HEAD_BRANCH}"
          else
            REF="${INPUT_REF}"
          fi
          BRANCH_DISPLAY="${REF#refs/heads/}"
          echo "Querying alerts on branch: ${BRANCH_DISPLAY}"

          # Fetch every open alert on this branch, paginated
          # Use @base64 so each alert is a single line, avoiding multi-line JSON issues
          ALERT_LINES=$(gh api \
            --paginate \
            -X GET \
            "repos/${REPO}/code-scanning/alerts" \
            -f state=open \
            -f ref="${REF}" \
            --jq '.[] | @base64')

          if [[ -z "${ALERT_LINES}" ]]; then
            echo "No open alerts found."
            exit 0
          fi

          CREATED=0
          SKIPPED=0

          # Iterate over each alert (base64-encoded, one per line)
          while IFS= read -r B64; do
            ALERT=$(echo "${B64}" | base64 -d)
            ALERT_NUMBER=$(echo "${ALERT}"  | jq -r '.number')
            RULE_ID=$(echo "${ALERT}"       | jq -r '.rule.id')
            RULE_NAME=$(echo "${ALERT}"     | jq -r '.rule.description')
            SEVERITY=$(echo "${ALERT}"      | jq -r '.rule.severity')
            TOOL_NAME=$(echo "${ALERT}"     | jq -r '.tool.name')
            ALERT_URL=$(echo "${ALERT}"     | jq -r '.html_url')
            FILE_PATH=$(echo "${ALERT}"     | jq -r '.most_recent_instance.location.path // empty')
            START_LINE=$(echo "${ALERT}"    | jq -r '.most_recent_instance.location.start_line // empty')
            END_LINE=$(echo "${ALERT}"      | jq -r '.most_recent_instance.location.end_line // empty')
            MESSAGE=$(echo "${ALERT}"       | jq -r '.most_recent_instance.message.text // empty')

            # Check for an existing open issue already tracking this alert
            EXISTING=$(gh issue list \
              --repo "${REPO}" \
              --state open \
              --search "\"CodeQL #${ALERT_NUMBER}\" in:title" \
              --json number \
              --jq 'length')

            if [[ "${EXISTING}" != "0" ]]; then
              echo "Alert #${ALERT_NUMBER}: issue already exists, skipping."
              SKIPPED=$((SKIPPED + 1))
              continue
            fi

            TITLE="[${SEVERITY^}] ${RULE_NAME} (${TOOL_NAME} #${ALERT_NUMBER})"

            BODY=$(cat <<EOF
          ## Alert

          **Rule:** \`${RULE_ID}\`
          **Severity:** ${SEVERITY^}
          **Tool:** ${TOOL_NAME}
          **Branch:** \`${BRANCH_DISPLAY}\`
          **Alert URL:** ${ALERT_URL}

          ## Location

          File: \`${FILE_PATH}\`, lines ${START_LINE}–${END_LINE}

          ## Message

          ${MESSAGE}

          ---
          *This issue was created automatically from a ${TOOL_NAME} code scanning alert.*
          EOF
          )

            gh issue create \
              --repo "${REPO}" \
              --title "${TITLE}" \
              --body "${BODY}" \
              --assignee "${OWNER}"

            echo "Alert #${ALERT_NUMBER}: issue created."
            CREATED=$((CREATED + 1))
          done <<< "${ALERT_LINES}"

          echo "Done. Created: ${CREATED}, Skipped: ${SKIPPED}"
