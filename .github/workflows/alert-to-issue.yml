name: Alert → Issue

on:
  code_scanning_alert:
    types: [appeared_in_branch, reopened]

permissions:
  contents: read
  issues: write
  security-events: read

jobs:
  create-issue:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check for duplicate issue
        id: dedup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALERT_NUMBER: ${{ github.event.alert.number }}
        run: |
          # Search for an open issue that already tracks this alert
          EXISTING=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "\"CodeQL #${ALERT_NUMBER}\" in:title" \
            --json number \
            --jq 'length')
          echo "existing=${EXISTING}" >> "$GITHUB_OUTPUT"

      - name: Create issue
        if: steps.dedup.outputs.existing == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RULE_ID:       ${{ github.event.alert.rule.id }}
          RULE_NAME:     ${{ github.event.alert.rule.description }}
          SEVERITY:      ${{ github.event.alert.rule.severity }}
          ALERT_URL:     ${{ github.event.alert.html_url }}
          ALERT_NUMBER:  ${{ github.event.alert.number }}
          TOOL_NAME:     ${{ github.event.alert.tool.name }}
          FILE_PATH:     ${{ github.event.alert.most_recent_instance.location.path }}
          START_LINE:    ${{ github.event.alert.most_recent_instance.location.start_line }}
          END_LINE:      ${{ github.event.alert.most_recent_instance.location.end_line }}
          MESSAGE:       ${{ github.event.alert.most_recent_instance.message.text }}
          REF:           ${{ github.event.ref }}
        run: |
          TITLE="[${SEVERITY^}] ${RULE_NAME} (${TOOL_NAME} #${ALERT_NUMBER})"

          BODY="## Alert

**Rule:** \`${RULE_ID}\`
**Severity:** ${SEVERITY^}
**Tool:** ${TOOL_NAME}
**Branch:** \`${REF#refs/heads/}\`
**Alert URL:** ${ALERT_URL}

## Location

File: \`${FILE_PATH}\`, lines ${START_LINE}–${END_LINE}

## Message

${MESSAGE}

---
*This issue was created automatically from a ${TOOL_NAME} code scanning alert.*"

          gh issue create \
            --repo "${{ github.repository }}" \
            --title "${TITLE}" \
            --body "${BODY}" \
            --assignee "${{ github.repository_owner }}"
